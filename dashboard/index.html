<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayrollDB — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <p>Loading PayrollDB...</p>
</div>

<div class="app" id="app">
  <header>
    <h1><span>●</span> PayrollDB</h1>
    <div class="meta" id="header-meta"></div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="employees">Employees</button>
    <button class="tab" data-tab="payroll">Payroll</button>
    <button class="tab" data-tab="reviews">Reviews</button>
    <button class="tab" data-tab="query">SQL Console</button>
  </div>

  <div class="content">
    <div class="panel active" id="panel-overview">
      <div class="stats-grid" id="overview-stats"></div>
      <div class="chart-row">
        <div class="chart-card">
          <h3>Salary by department</h3>
          <div class="bar-chart" id="chart-salary"></div>
        </div>
        <div class="chart-card">
          <h3>Budget utilization</h3>
          <div class="bar-chart" id="chart-budget"></div>
        </div>
      </div>
      <div class="section">
        <div class="section-header"><h2>Recent bonuses</h2></div>
        <div id="table-bonuses"></div>
      </div>
    </div>

    <div class="panel" id="panel-employees">
      <div class="section-header" style="margin-bottom:16px">
        <h2>All employees</h2>
        <div style="display:flex;gap:10px;align-items:center">
          <input class="search-box" id="emp-search" placeholder="Search by name, title, or dept...">
          <button class="sql-btn" id="add-emp-btn">+ Add employee</button>
        </div>
      </div>
      <div id="table-employees"></div>
    </div>

    <div class="panel" id="panel-payroll">
      <div class="stats-grid" id="payroll-stats"></div>
      <div class="section">
        <div class="section-header"><h2>Payroll records</h2></div>
        <div id="table-payroll"></div>
      </div>
    </div>

    <div class="panel" id="panel-reviews">
      <div class="stats-grid" id="review-stats"></div>
      <div class="section">
        <div class="section-header"><h2>Performance reviews</h2></div>
        <div id="table-reviews"></div>
      </div>
    </div>

    <div class="panel" id="panel-query">
      <div class="sql-area">
        <textarea class="sql-input" id="sql-input" placeholder="SELECT * FROM employees LIMIT 10;">SELECT e.first_name || ' ' || e.last_name AS name, e.job_title, d.name AS department, e.base_salary
FROM employees e
JOIN departments d ON e.department_id = d.department_id
ORDER BY e.base_salary DESC
LIMIT 10;</textarea>
        <button class="sql-btn" id="sql-run">Run query</button>
        <div class="sql-result" id="sql-result"></div>
      </div>
    </div>
  </div>
</div>

<div id="modal"></div>

<script src="js/api.js"></script>
<script src="js/render.js"></script>
<script src="js/tabs.js"></script>
<script src="js/app.js"></script>
</body>
</html>
